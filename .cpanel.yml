---
deployment:
  tasks:
    # 1. Definir la ruta de destino en tu cPanel (reemplaza 'tu_usuario_cpanel' por tu usuario real)
    - export DEPLOYPATH=/home/tu_usuario_cpanel/public_html/shalom-erp/
    
    # 2. Copiar todos los archivos al directorio de producción
    - /bin/cp -R * $DEPLOYPATH
    
    # 3. Dar permisos correctos a la carpeta de almacenamiento de Laravel
    - /bin/chmod -R 775 $DEPLOYPATH/storage $DEPLOYPATH/bootstrap/cache
